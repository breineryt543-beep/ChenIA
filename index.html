<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web con IA</title>
    <link rel="stylesheet" href="styles.css">  <!-- Enlaza el archivo CSS -->
</head>
<body>
    <header>
        <h1>Bienvenido a mi IA</h1>
        <p>Interactúa con nuestra Inteligencia Artificial.</p>
    </header>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <!-- Aquí aparecerán los mensajes -->
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje..." />
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>  <!-- Enlaza el archivo JavaScript -->
</body>
</html>
